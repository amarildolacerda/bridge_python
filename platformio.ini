; PlatformIO Unified Configuration for Bridge Clients
; Modular build pattern inspired by lampada project
; Build specific client: pio run -e client_dht21
; Build all: pio run

[platformio]
default_envs = client_dht21
src_dir = .

; =============================================
; COMMON SETTINGS (shared by all environments)
; =============================================
[common]
platform = espressif8266
board = d1_mini
framework = arduino
monitor_speed = 115200
board_build.flash_mode = dio
board_build.f_cpu = 80000000L
board_build.f_flash = 40000000L
upload_speed = 921600

; Common build flags
build_flags =
    -D FW_VERSION="v0.0.10"
    -D DEVICE_ID_PREFIX="esp8266_"
    -D BRIDGE_HOST="0.0.0.0"
    -D BRIDGE_PORT=80
    -D WIFI_TIMEOUT_RESET_MS=120000
    -D ENABLED_SERIAL
    -D PORTAL
    -D EEPROM_SIZE=512
    -D MAGIC_NUMBER=0x42
    -D MAGIC_NUMBER_ADDR=0
    -D PIN_CONFIG_ADDR=1
    -D NOME_CONFIG_ADDR=2
    -D TIMEOUT_CONFIG_ADDR=34

; Common library dependencies
lib_deps =
    bblanchon/ArduinoJson@^7.4.3
    tzapu/WiFiManager@^2.0.17
    WebSockets@^2.3.6

; Common source filter - exclude all by default, each env includes its own
src_filter =
    -<*>
    -<common/**>
    -<test/**>
    -<.git/**>
    -<docs/**>
    -<esp32_bridge_python/**>
    -<main/**>
    -<build/**>
    -<managed_components/**>

; =============================================
; CLIENT: DHT21 Temperature/Humidity
; =============================================
[env:client_dht21]
extends = common
board = d1_mini
build_flags =
    ${common.build_flags}
    -D DHT21_CLIENT
    -D DHT_PIN=5
    -D DHT_TYPE=DHT21
    -D LOOP_INTERVALO=60000
    -D LOOP_DEEP_SLEEP=0
    -D NOME_ID="dht21"
    -I clients/esp8266_dht21/include
lib_deps =
    ${common.lib_deps}
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.9
src_filter =
    ${common.src_filter}
    +<clients/esp8266_dht21/src/*>

; =============================================
; CLIENT: DHT21 + Gas (MQ-2/MQ-135)
; =============================================
[env:client_dht_gas]
extends = common
board = d1_mini
build_flags =
    ${common.build_flags}
    -D DHT_GAS_CLIENT
    -D DHT_PIN=5
    -D DHT_TYPE=DHT21
    -D GAS_PIN=A0
    -D LOOP_INTERVALO=60000
    -D LOOP_DEEP_SLEEP=0
    -D NOME_ID="dht_gas"
    -I clients/esp8266_dht_gas/include
lib_deps =
    ${common.lib_deps}
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.9
src_filter =
    ${common.src_filter}
    +<clients/esp8266_dht_gas/src/*>

; =============================================
; CLIENT: Gas Sensor (MQ-2/MQ-135)
; =============================================
[env:client_gas]
extends = common
board = nodemcuv2
build_flags =
    ${common.build_flags}
    -D GAS_CLIENT
    -D GAS_PIN=A0
    -D LOOP_INTERVALO=30000
    -D LOOP_DEEP_SLEEP=0
    -D NOME_ID="gas"
src_filter =
    ${common.src_filter}
    +<clients/esp8266_gas/src/*>

; =============================================
; CLIENT: Rain Sensor
; =============================================
[env:client_chuva]
extends = common
board = d1_mini
build_flags =
    ${common.build_flags}
    -D CHUVA_CLIENT
    -D CHUVA_PIN_ANALOG=A0
    -D CHUVA_PIN_DIGITAL=4
    -D LOOP_INTERVALO=10000
    -D LOOP_DEEP_SLEEP=0
    -D NOME_ID="chuva"
src_filter =
    ${common.src_filter}
    +<clients/esp8266_chuva/src/*>

; =============================================
; CLIENT: Electricity/Current Sensor (SCT-013)
; =============================================
[env:client_electricity]
extends = common
board = d1_mini
build_flags =
    ${common.build_flags}
    -D ELECTRICITY_CLIENT
    -D CURRENT_PIN=A0
    -D VOLTAGE_PIN=A0
    -D LOOP_INTERVALO=10000
    -D LOOP_DEEP_SLEEP=0
    -D NOME_ID="electricity"
src_filter =
    ${common.src_filter}
    +<clients/esp8266_electricity/src/*>

; =============================================
; CLIENT: Occupancy/Presence (PIR)
; =============================================
[env:client_occupancy]
extends = common
board = d1_mini
build_flags =
    ${common.build_flags}
    -D OCCUPANCY_CLIENT
    -D PIR_PIN=4
    -D LOOP_INTERVALO=5000
    -D LOOP_DEEP_SLEEP=0
    -D NOME_ID="occupancy"
src_filter =
    ${common.src_filter}
    +<clients/esp8266_occupancy/src/*>

; =============================================
; CLIENT: On/Off Relay Switch
; =============================================
[env:client_on_off]
extends = common
board = d1_mini
build_flags =
    ${common.build_flags}
    -D ON_OFF_CLIENT
    -D RELE_PIN=5
    -D BUTTON_PIN=4
    -D ENBALED_BUTTON_PIN
    -D MAX_TIMED_ON_MINUTES=60
    -D LOOP_INTERVALO=1000
    -D LOOP_DEEP_SLEEP=0
    -D NOME_ID="onoff"
src_filter =
    ${common.src_filter}
    +<clients/esp8266_on_off/src/*>

; =============================================
; CLIENT: Water Tank Level (Ultrasonic)
; =============================================
[env:client_tanque]
extends = common
board = d1_mini
build_flags =
    ${common.build_flags}
    -D TANQUE_CLIENT
    -D TRIG_PIN=5
    -D ECHO_PIN=4
    -D TANK_HEIGHT_CM=100
    -D LOOP_INTERVALO=60000
    -D LOOP_DEEP_SLEEP=0
    -D NOME_ID="tanque"
src_filter =
    ${common.src_filter}
    +<clients/esp8266_tanque/src/*>

; =============================================
; CLIENT: ESP32 MQTT (if using ESP32)
; =============================================
[env:client_esp32_mqtt]
platform = espressif32
board = esp32dev
framework = arduino
extends = common
build_flags =
    ${common.build_flags}
    -D ESP32_MQTT_CLIENT
    -D LOOP_INTERVALO=10000
    -D NOME_ID="esp32_mqtt"
lib_deps =
    ${common.lib_deps}
    knolleary/PubSubClient@^2.8
src_filter =
    ${common.src_filter}
    +<clients/esp32_mqtt/src/*>

; =============================================
; OTA Upload environments (configure IP per device)
; =============================================
[env:client_dht21_ota]
extends = client_dht21
upload_protocol = espota
upload_port = 192.168.1.XXX

[env:client_gas_ota]
extends = client_gas
upload_protocol = espota
upload_port = 192.168.1.XXX

[env:client_chuva_ota]
extends = client_chuva
upload_protocol = espota
upload_port = 192.168.1.XXX

[env:client_tanque_ota]
extends = client_tanque
upload_protocol = espota
upload_port = 192.168.1.XXX

; =============================================
; Build all clients (for CI)
; =============================================
[env:build_all]
extends = common
platform = espressif8266
board = d1_mini
build_flags = ${common.build_flags}
src_filter = ${common.src_filter}