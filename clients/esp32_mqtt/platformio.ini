[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    https://github.com/terrorsl/sMQTTBroker.git
    bblanchon/ArduinoJson@^7.3.1
    WiFiManager

[env:esp32c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
lib_deps =
    https://github.com/terrorsl/sMQTTBroker.git
    bblanchon/ArduinoJson@^7.3.1
    WiFiManager
