services:
  esp-matter-dev:
    image: espressif/esp-matter:latest
    container_name: esp-matter-dev
    
    ports:
      - "8080:8080"
        
    volumes:
      - C:\git\bridge:/project
      - idf_cache:/root/.espressif
    
    environment:
      - IDF_TARGET=esp32
    
    command: /bin/bash -c "export IDF_TARGET=esp32 && source /opt/espressif/esp-matter/export.sh && source /opt/espressif/esp-idf/export.sh && cd /project && tail -f /dev/null"

  opencode:
    image: ghcr.io/anomalyco/opencode:latest    
    container_name: opencode-ai
    restart: unless-stopped
    
    ports:
      - "3001:3000"  # Porta alterada para evitar conflito
    
    volumes:
      - C:\git\bridge:/workspace
      - opencode_config:/root/.config/opencode
      - opencode_data:/root/.local/share/opencode
    
    # Remove o command complexo, usa apenas o padrão da imagem
    stdin_open: true
    tty: true
    
    networks:
      - esp-net

networks:
  esp-net:
    driver: bridge

volumes:
  idf_cache:
    name: idf_cache
  opencode_config:
    name: opencode_config
  opencode_data:
    name: opencode_data