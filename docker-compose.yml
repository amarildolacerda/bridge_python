services:
  esp-matter-dev:
    build: .
    container_name: esp-matter-dev
    restart: unless-stopped
    
    volumes:
      - C:\git\matter-gateway-base:/project
      - idf_cache:/root/.espressif
    
    environment:
      - IDF_TARGET=esp32
    
    command: /bin/bash -c "export IDF_TARGET=esp32 && source /opt/espressif/esp-matter/export.sh && source /opt/espressif/esp-idf/export.sh && cd /project && exec bash -i"

volumes:
  idf_cache:
    name: idf_cache