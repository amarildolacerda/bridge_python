<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ESP-Matter Bridge</title>
<link rel="stylesheet" href="/dashboard.css">
</head>
<body>
<div class="page">
<section class="hero">
<div class="hero-card">
<p class="eyebrow">ESP32 Matter Bridge</p>
<h1>Dashboard</h1>
<div class="sub" id="sub">carregando...</div>
</div>
<div class="summary-grid">
<div class="metric"><span class="metric-label">Bridge</span><span class="metric-value" id="metric-ip">—</span></div>
<div class="metric"><span class="metric-label">Uptime</span><span class="metric-value" id="metric-uptime">—</span></div>
<div class="metric"><span class="metric-label">Heap livre</span><span class="metric-value" id="metric-heap">—</span></div>
</div>
</section>

<section class="content">
<div class="card">
<h2>Status do Bridge</h2>
<div id="bridge-info"><div class="row"><span class="label">IP</span><span class="value">—</span></div></div>
</div>
 <div class="card">
 <h2>Comissionamento Matter</h2>
 <div id="commissioning-info"><div class="empty">carregando...</div></div>
 <button class="btn" onclick="reopenCommissioning()" id="btn-commission" style="margin-top:12px;width:100%">Reabrir Comissionamento</button>
 </div>
<div class="card">
<h2>Dispositivos <span id="dev-count" style="color:#7A8BA3;font-weight:400"></span></h2>
<div id="devices"><div class="empty">carregando...</div></div>
</div>
</section>
</div>
<script>
async function load(){try{
let r=await fetch('/api/bridge/info');
let b=await r.json();
let u=b.uptime_s|0;
let uptime=''+(u>86400?Math.floor(u/86400)+'d ':'')+Math.floor((u%86400)/3600)+'h'+Math.floor((u%3600)/60)+'m'+u%60+'s';
document.getElementById('bridge-info').innerHTML=
'<div class="row"><span class="label">IP</span><span class="value">'+b.ip+'</span></div>'+
'<div class="row"><span class="label">Uptime</span><span class="value">'+uptime+'</span></div>'+
'<div class="row"><span class="label">Heap livre</span><span class="value">'+(b.free_heap/1024).toFixed(0)+' KB</span></div>';
document.getElementById('sub').textContent='IP: '+b.ip;
document.getElementById('metric-ip').textContent=b.ip;
document.getElementById('metric-uptime').textContent=uptime;
document.getElementById('metric-heap').textContent=(b.free_heap/1024).toFixed(0)+' KB';
}catch(e){document.getElementById('bridge-info').innerHTML='<div class="row"><span class="label" style="color:#C62828">Erro de conexão</span></div>'}

try{
let r=await fetch('/api/bridge/commissioning');
let c=await r.json();
document.getElementById('commissioning-info').innerHTML=
'<div class="row"><span class="label">Código manual</span><span class="value code" id="manual-code">'+c.manual_code+'</span><button class="cpy" onclick="navigator.clipboard.writeText(\''+c.manual_code+'\')">copiar</button></div>'+
'<div class="row"><span class="label">PIN</span><span class="value">'+c.pin+'</span></div>'+
'<div class="row"><span class="label">Discriminator</span><span class="value">'+c.discriminator+'</span></div>'+
'<div class="row"><span class="label">QR Payload</span><span class="value code" style="font-size:12px">'+c.qr_code_payload+'</span></div>';
}catch(e){document.getElementById('commissioning-info').innerHTML='<div class="empty">Dispositivo já comissionado ou erro</div>'}

try{
let r=await fetch('/api/devices');
let d=await r.json();
let devs=d.devices||[];
let h='';
let on=0;
for(let dev of devs){
if(dev.online)on++;
let st=dev.state||{};
let stHtml='';
if('on' in st)stHtml='<span class="'+(st.on?'state-on':'state-off')+'">'+(st.on?'LIGADO':'DESLIGADO')+'</span>';
else if('temperature' in st)stHtml=st.temperature.toFixed(1)+'\u00B0C '+(st.humidity!=null?st.humidity.toFixed(0)+'%':'');
else if('contact' in st)stHtml=st.contact?'ABERTO':'FECHADO';
else if('occupancy' in st)stHtml=st.occupancy?'MOVIMENTO':'LIVRE';
else stHtml='<span style="color:#7A8BA3">—</span>';
let ipLink=dev.ip&&dev.ip!='0.0.0.0'?'<a href="http://'+dev.ip+'" target="_blank" style="color:#3498DB;text-decoration:none">'+dev.ip+'</a>':'—';
h+='<div class="device">'+
'<div class="device-head"><span class="led '+(dev.online?'on':'off')+'"></span><span class="dev-name">'+dev.name+'</span> <span class="badge '+(dev.online?'on':'off')+'">'+(dev.online?'online':'offline')+'</span></div>'+
'<div class="dev-meta">'+dev.type+' &middot; ep '+dev.endpoint_id+' &middot; '+ipLink+'</div>'+
'<div class="dev-state">'+stHtml+'</div></div>';
}
document.getElementById('devices').innerHTML=h||'<div class="empty">Nenhum dispositivo registrado</div>';
document.getElementById('dev-count').textContent='('+on+'/'+devs.length+' online)';
}catch(e){document.getElementById('devices').innerHTML='<div class="empty" style="color:#C62828">Erro ao carregar dispositivos</div>'}
}
async function reopenCommissioning(){
 let btn=document.getElementById('btn-commission');
 btn.disabled=true;btn.textContent='Abrindo...';
 try{
  let r=await fetch('/api/bridge/commission',{method:'POST'});
  let j=await r.json();
  if(j.status=='ok'){
   btn.textContent='Janela aberta por 60s';
   setTimeout(()=>{load();btn.disabled=false;btn.textContent='Reabrir Comissionamento';},2000);
  }else{btn.textContent='Erro';setTimeout(()=>{btn.disabled=false;btn.textContent='Reabrir Comissionamento';},3000);}
 }catch(e){btn.textContent='Erro';setTimeout(()=>{btn.disabled=false;btn.textContent='Reabrir Comissionamento';},3000);}
}
load();setInterval(load,5000);
</script>
</body>
</html>
